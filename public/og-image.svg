<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Green glow blob top-right -->
  <ellipse cx="950" cy="150" rx="300" ry="250" fill="#16a34a" opacity="0.12"/>

  <!-- Green glow blob bottom-left -->
  <ellipse cx="200" cy="500" rx="250" ry="200" fill="#059669" opacity="0.08"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="5" height="120" rx="3" fill="#16a34a"/>

  <!-- Brand badge -->
  <rect x="95" y="80" width="220" height="36" rx="18" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="205" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="1">TERRASGIGANT.NL</text>

  <!-- Main heading -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#f8fafc">De beste</text>
  <text x="80" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900">
    <tspan fill="#4ade80">terrasmeubelen</tspan>
  </text>
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#f8fafc">van 2026</text>

  <!-- Subtext -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">Onafhankelijk advies · Loungesets · Tuinsets · Parasols</text>

  <!-- Trust indicators -->
  <rect x="80" y="495" width="180" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="170" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Onafhankelijk</text>

  <rect x="272" y="495" width="160" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="352" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="600">✓ NL advies</text>

  <rect x="444" y="495" width="180" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="534" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Actueel 2026</text>

  <!-- Large chair emoji area -->
  <text x="920" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="200" text-anchor="middle" opacity="0.15">🪑</text>

  <!-- Bottom URL -->
  <text x="1120" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#475569" text-anchor="end">www.terrasgigant.nl</text>
</svg>
